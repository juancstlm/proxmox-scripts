services:
  gluetun:
    image: qmcgaw/gluetun:latest
    container_name: gluetun
    cap_add:
      - NET_ADMIN
    devices:
      - /dev/net/tun:/dev/net/tun
    environment:
      - VPN_SERVICE_PROVIDER=protonvpn
      - VPN_TYPE=wireguard
      - WIREGUARD_PRIVATE_KEY=${WG_PRIVATE_KEY}
      - WIREGUARD_ADDRESSES=${WG_ADDRESSES}
      - SERVER_COUNTRIES=${VPN_COUNTRIES}
      - VPN_PORT_FORWARDING=on
      - VPN_PORT_FORWARDING_PROVIDER=protonvpn
      - VPN_PORT_FORWARDING_STATUS_FILE=/gluetun/forwarded_port
      - PORT_FORWARD_ONLY=on
      - FIREWALL_OUTBOUND_SUBNETS=${LAN}
      - TZ=${TZ}
    ports:
      - 8080:8080  # qbittorrent webui (shares netns with gluetun)
    volumes:
      - ${CONFIG_PATH}/gluetun:/gluetun
    restart: unless-stopped

  qbittorrent:
    image: ghcr.io/hotio/qbittorrent:release-5.1.2
    container_name: qbittorrent
    network_mode: "service:gluetun"
    depends_on:
      gluetun:
        condition: service_started
    environment:
      - PUID=1000
      - PGID=1000
      - UMASK=002
      - TZ=${TZ}
      - WEBUI_PORTS=8080/tcp
    volumes:
      - ${CONFIG_PATH}/qbittorrent/:/config
      - ${MEDIA_PATH}:/media
    restart: unless-stopped

  qbit-port-sync:
    image: alpine:3.20
    container_name: qbit-port-sync
    depends_on:
      gluetun:
        condition: service_started
      qbittorrent:
        condition: service_started
    environment:
      - TZ=${TZ}
      - SYNC_INTERVAL=120
    volumes:
      - ./qbit-port-sync.sh:/usr/local/bin/qbit-port-sync.sh:ro
      - ${CONFIG_PATH}/gluetun:/gluetun:ro
    entrypoint: ["sh", "/usr/local/bin/qbit-port-sync.sh"]
    restart: unless-stopped

  prowlarr:
    image: lscr.io/linuxserver/prowlarr:latest
    container_name: prowlarr
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=${TZ}
    volumes:
      - ${CONFIG_PATH}/prowlarr/:/config
      - ${MEDIA_PATH}:/media
    ports:
      - 9696:9696
    restart: unless-stopped

  radarr:
    image: lscr.io/linuxserver/radarr:latest
    container_name: radarr
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=${TZ}
    volumes:
      - ${CONFIG_PATH}/radarr/:/config
      - ${MEDIA_PATH}:/media
    ports:
      - 7878:7878
    restart: unless-stopped

  sonarr:
    image: lscr.io/linuxserver/sonarr:latest
    container_name: sonarr
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=${TZ}
    volumes:
      - ${CONFIG_PATH}/sonarr/:/config
      - ${MEDIA_PATH}:/media
    ports:
      - 8989:8989
    restart: unless-stopped

  seerr:
    image: ghcr.io/seerr-team/seerr:latest
    init: true
    user: "1000:1000"
    container_name: seerr
    environment:
      - LOG_LEVEL=info
      - TZ=${TZ}
      - PORT=5055
    ports:
      - 5055:5055
    volumes:
      - ${CONFIG_PATH}/seerr:/app/config
    healthcheck:
      test: wget --no-verbose --tries=1 --spider http://localhost:5055/api/v1/status || exit 1
      start_period: 20s
      timeout: 3s
      interval: 15s
      retries: 3
    restart: unless-stopped

  flaresolverr:
    image: ghcr.io/flaresolverr/flaresolverr:latest
    container_name: flaresolverr
    environment:
      - LOG_LEVEL=info
      - LOG_HTML=false
      - CAPTCHA_SOLVER=none
      - TZ=${TZ}
    ports:
      - 8191:8191
    restart: unless-stopped

  qui:
    image: ghcr.io/autobrr/qui:latest
    container_name: qui
    user: "1000:1000"
    restart: unless-stopped
    ports:
      - "7476:7476"
    volumes:
      - ${CONFIG_PATH}/qui/:/config
      - ${MEDIA_PATH}:/media

  profilarr:
    image: ghcr.io/dictionarry-hub/profilarr:latest
    container_name: profilarr
    restart: unless-stopped
    ports:
      - "6868:6868"
    volumes:
      - ${CONFIG_PATH}/profilarr:/config
    environment:
      - PUID=1000
      - PGID=1000
      - UMASK=022
      - TZ=${TZ}

  watchtower:
    image: nickfedor/watchtower
    container_name: watchtower
    environment:
      - TZ=${TZ}
      - WATCHTOWER_MONITOR_ONLY=true
      - WATCHTOWER_CLEANUP=true
      - WATCHTOWER_INCLUDE_STOPPED=true
      - WATCHTOWER_SCHEDULE=0 0 3 * * *
    restart: unless-stopped
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock

  dozzle:
    container_name: dozzle
    image: amir20/dozzle:latest
    ports:
      - '8888:8080'
    restart: unless-stopped
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
